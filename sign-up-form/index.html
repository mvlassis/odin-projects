<!DOCTYPE html>
<html>
  <head>
	<link rel="stylesheet" href="style.css" />
  </head>
  <body>
	<div id="left">
	  <div class="image-wrap">
		<img src="assets/dk-minecart.png" alt="Donkey Kong and Pauline in a minecart"
			 width="300" />
		<div class="card-body">Monke.</div>
	  </div>
	</div>
	<div id="main">
	  <div class="section">
		<p>This is not a real online service! You know you need something like this in your life to help you relize your deepest dreams. Sign up <strong>now</strong> to get started.</p>
		<p>You <strong>know</strong> you want to.</p>
	  </div>
	  <div class="form">
		<p>Alright chumps, let's do this!</p>
		<form action="signup" method="post">
		  <div class="field">
			  <label for="first_name">First Name</label>
			  <input type="text" id="first_name" name="first_name" placeholder="John" required />
		  </div>
		  <div class="field">
		  <label for="last_name">Last Name</label>
		  <input type="text" id="last_name" name="last_name" placeholder="Smith" required/>
		  </div>
		  <div class="field">
			  <label for="email">Email</label>
			  <input type="email" id="email" name="email" required />
		  </div>
		  <div class="field">
			  <label for="phone_number">Phone Number</label>
			  <input type="number" id="phone_number" name="phone_number" required />
		  </div>
		  <div class="field">
			  <label for="password">Password</label>
			  <input type="password" id="password" name="password" required />
		  </div>
		  <div class="field">
			  <label for="confim_password">Confirm Password</label>
			  <input type="text" id="confirm_password" name="confirm_password" required />
		  </div>
		</form>
	  </div>
	  <div class="section">
		<button type="submit">Create account</button>
		<p>Already have an account? <a href="#">Log in</a></p>
	  </div>
	</div>
  </body>
</html>
